<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Icon Studio</title>
<style>
  :root {
    --ink: #15130f;
    --paper: #ECE7DC;
    --panel: #F6F2E9;
    --line: #C9C1AE;
    --accent: #D9542B;
    --accent-soft: #f0d9cf;
    --muted: #6b6453;
    --grid-a: #ddd6c6;
    --grid-b: #e8e2d4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: ui-sans-serif, -apple-system, "Segoe UI", Roboto, sans-serif;
    display: grid;
    grid-template-columns: 1fr 320px;
    min-height: 100vh;
  }
  /* ---- Stage ---- */
  .stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    gap: 18px;
    position: relative;
  }
  .brand {
    position: absolute;
    top: 26px;
    left: 32px;
    font-weight: 800;
    letter-spacing: -0.02em;
    font-size: 15px;
  }
  .brand span { color: var(--accent); }
  .brand small {
    display: block;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-size: 9px;
    color: var(--muted);
    margin-top: 2px;
  }
  .canvas-frame {
    position: relative;
    width: 460px;
    height: 460px;
    max-width: 70vmin;
    max-height: 70vmin;
    aspect-ratio: 1/1;
    border: 1px solid var(--line);
    box-shadow: 0 12px 40px -18px rgba(0,0,0,.4);
    background-image:
      linear-gradient(45deg, var(--grid-a) 25%, transparent 25%),
      linear-gradient(-45deg, var(--grid-a) 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, var(--grid-a) 75%),
      linear-gradient(-45deg, transparent 75%, var(--grid-a) 75%);
    background-size: 24px 24px;
    background-position: 0 0, 0 12px, 12px -12px, -12px 0;
    background-color: var(--grid-b);
    cursor: grab;
    overflow: hidden;
    touch-action: none;
  }
  .canvas-frame.dragging { cursor: grabbing; }
  #view { width: 100%; height: 100%; display: block; }
  .drop-hint {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--muted);
    text-align: center;
    padding: 24px;
    pointer-events: none;
  }
  .drop-hint svg { opacity: .55; }
  .drop-hint strong { font-size: 14px; color: var(--ink); }
  .drop-hint span { font-size: 12px; }
  .canvas-frame.over { outline: 2px dashed var(--accent); outline-offset: -8px; }
  .stage-note { font-size: 11px; color: var(--muted); }

  /* ---- Panel ---- */
  .panel {
    background: var(--panel);
    border-left: 1px solid var(--line);
    padding: 26px 24px;
    display: flex;
    flex-direction: column;
    gap: 26px;
    overflow-y: auto;
  }
  .panel h2 {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--muted);
    font-weight: 700;
    border-bottom: 1px solid var(--line);
    padding-bottom: 8px;
  }
  .field { display: flex; flex-direction: column; gap: 8px; }
  .field .row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 12px;
    color: var(--muted);
  }
  .field .val {
    font-variant-numeric: tabular-nums;
    color: var(--ink);
    font-weight: 600;
  }
  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 2px;
    background: var(--line);
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 3px solid var(--panel);
    box-shadow: 0 0 0 1px var(--accent);
  }
  input[type=range]::-moz-range-thumb {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 3px solid var(--panel);
  }
  .btn {
    font: inherit;
    font-size: 13px;
    font-weight: 600;
    padding: 11px 14px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--ink);
    cursor: pointer;
    text-align: center;
    transition: background .12s, border-color .12s;
  }
  .btn:hover { background: #ffffff8a; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-accent {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .btn-accent:hover { background: #c1481f; }
  .btn-row { display: flex; gap: 10px; }
  .btn-row .btn { flex: 1; }
  .upload-btn {
    display: block;
    border-style: dashed;
  }
  .upload-btn input { display: none; }
  .size-select {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .size-select button {
    font: inherit;
    font-size: 12px;
    font-weight: 600;
    padding: 8px 0;
    border: 1px solid var(--line);
    background: transparent;
    cursor: pointer;
    color: var(--ink);
  }
  .size-select button.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
  }
  .switch { position: relative; width: 38px; height: 20px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; inset: 0;
    background: var(--line);
    border-radius: 20px;
    cursor: pointer;
    transition: .15s;
  }
  .slider::before {
    content: "";
    position: absolute;
    height: 14px; width: 14px;
    left: 3px; top: 3px;
    background: #fff;
    border-radius: 50%;
    transition: .15s;
  }
  .switch input:checked + .slider { background: var(--accent); }
  .switch input:checked + .slider::before { transform: translateX(18px); }
  .hint-sm { font-size: 11px; color: var(--muted); line-height: 1.5; }

  .seg {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }
  .seg button {
    font: inherit;
    font-size: 12px;
    font-weight: 600;
    padding: 9px 0;
    border: 1px solid var(--line);
    background: transparent;
    cursor: pointer;
    color: var(--ink);
    transition: background .12s, color .12s, border-color .12s;
  }
  .seg button:hover { background: #ffffff8a; }
  .seg button.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  @media (max-width: 820px) {
    body { grid-template-columns: 1fr; }
    .panel { border-left: none; border-top: 1px solid var(--line); }
    .brand { position: static; margin-bottom: 4px; }
    .stage { padding-top: 24px; }
  }
</style>
</head>
<body>
  <main class="stage">
    <div class="brand">Icon<span>·</span>Studio<small>1:1 icon studio</small></div>

    <div class="canvas-frame" id="frame">
      <canvas id="view"></canvas>
      <div class="drop-hint" id="hint">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="4"/>
          <path d="M3 16l5-5 4 4 3-3 6 6"/>
          <circle cx="9" cy="9" r="1.5"/>
        </svg>
        <strong>Drop an image here</strong>
        <span>or browse on the right</span>
      </div>
    </div>
    <p class="stage-note">Drag to move · scroll to zoom</p>
  </main>

  <aside class="panel">
    <div class="field">
      <h2>Source</h2>
      <label class="btn upload-btn">
        Browse image
        <input type="file" id="file" accept="image/*">
      </label>
    </div>

    <div class="field">
      <h2>Size</h2>
      <div class="row"><span>Zoom</span><span class="val" id="zoomVal">100%</span></div>
      <input type="range" id="zoom" min="10" max="400" value="100" disabled>
      <div class="btn-row" style="margin-top:4px">
        <button class="btn" id="fit" disabled>Fill</button>
        <button class="btn" id="contain" disabled>Fit</button>
      </div>
    </div>

    <div class="field">
      <h2>Shape</h2>
      <div class="row"><span>Corner radius</span><span class="val" id="radiusVal">20%</span></div>
      <input type="range" id="radius" min="0" max="50" value="20">
      <div class="row" style="margin-top:6px"><span>Margin</span><span class="val" id="marginVal">10%</span></div>
      <input type="range" id="margin" min="0" max="40" value="10">
      <div class="toggle" style="margin-top:4px">
        <span>Circle mask</span>
        <label class="switch">
          <input type="checkbox" id="circle">
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="field">
      <h2>Effect</h2>
      <div class="seg" id="effect">
        <button data-fx="none" class="active">None</button>
        <button data-fx="shadow">Shadow</button>
        <button data-fx="emboss">Emboss</button>
        <button data-fx="deboss">Deboss</button>
      </div>
      <div class="row" style="margin-top:8px"><span>Strength</span><span class="val" id="fxVal">50%</span></div>
      <input type="range" id="fxStrength" min="0" max="100" value="50" disabled>
    </div>

    <div class="field">
      <h2>Export</h2>
      <div class="size-select" id="sizes">
        <button data-size="64">64</button>
        <button data-size="128">128</button>
        <button data-size="256" class="active">256</button>
        <button data-size="512">512</button>
        <button data-size="1024">1024</button>
        <button data-size="orig">source</button>
      </div>
      <button class="btn btn-accent" id="export" disabled style="margin-top:6px">Save PNG</button>
      <p class="hint-sm">Exports with transparent background and the chosen mask.</p>
    </div>
  </aside>

<script>
(() => {
  const frame   = document.getElementById('frame');
  const view    = document.getElementById('view');
  const ctx     = view.getContext('2d');
  const hint    = document.getElementById('hint');
  const fileIn  = document.getElementById('file');
  const zoom    = document.getElementById('zoom');
  const zoomVal = document.getElementById('zoomVal');
  const radius  = document.getElementById('radius');
  const radiusVal = document.getElementById('radiusVal');
  const margin  = document.getElementById('margin');
  const marginVal = document.getElementById('marginVal');
  const circle  = document.getElementById('circle');
  const effect  = document.getElementById('effect');
  const fxStrength = document.getElementById('fxStrength');
  const fxVal   = document.getElementById('fxVal');
  const fitBtn  = document.getElementById('fit');
  const containBtn = document.getElementById('contain');
  const exportBtn  = document.getElementById('export');
  const sizes   = document.getElementById('sizes');

  const DPR = Math.min(window.devicePixelRatio || 1, 2);
  let img = null;
  // transform state in CSS px relative to canvas display size
  let state = { scale: 1, x: 0, y: 0 };
  let exportSize = 256;
  let dispSize = 460; // display px (square)
  let fxMode = 'none';

  function resizeCanvas() {
    const r = frame.getBoundingClientRect();
    dispSize = r.width;
    view.width  = Math.round(dispSize * DPR);
    view.height = Math.round(dispSize * DPR);
    view.style.width = dispSize + 'px';
    view.style.height = dispSize + 'px';
    render();
  }

  function roundRectPath(c, x, y, w, h, r) {
    r = Math.min(r, w/2, h/2);
    c.beginPath();
    c.moveTo(x + r, y);
    c.arcTo(x + w, y,     x + w, y + h, r);
    c.arcTo(x + w, y + h, x,     y + h, r);
    c.arcTo(x,     y + h, x,     y,     r);
    c.arcTo(x,     y,     x + w, y,     r);
    c.closePath();
  }

  // builds a path for the icon shape at given rect + radius
  function shapePath(c, x, y, w, h, r) {
    roundRectPath(c, x, y, w, h, r);
  }

  // draws the masked image onto a given context sized `size` (device px square)
  function paint(c, size) {
    c.clearRect(0, 0, size, size);

    const m = (margin.value / 100) * size;      // transparent margin (px)
    const inner = size - 2 * m;                  // icon box side
    if (inner <= 0) return;
    const r = circle.checked ? inner/2 : (radius.value/100) * inner;
    const strength = fxStrength.value / 100;

    // ---- the icon itself, rendered to an offscreen buffer (so effects can sample it) ----
    const buf = document.createElement('canvas');
    buf.width = size; buf.height = size;
    const bc = buf.getContext('2d');
    bc.save();
    shapePath(bc, m, m, inner, inner, r);
    bc.clip();
    if (img) {
      const k = size / dispSize;
      const w = img.width * state.scale * k;
      const h = img.height * state.scale * k;
      const x = state.x * k + m;   // offset by margin so panning feels anchored to icon box
      const y = state.y * k + m;
      bc.imageSmoothingQuality = 'high';
      bc.drawImage(img, x, y, w, h);
    }
    bc.restore();

    // ---- drop shadow under the whole icon ----
    if (fxMode === 'shadow' && strength > 0) {
      c.save();
      c.shadowColor = `rgba(0,0,0,${0.55 * strength})`;
      c.shadowBlur = inner * 0.10 * strength;
      c.shadowOffsetY = inner * 0.045 * strength;
      c.drawImage(buf, 0, 0);
      c.restore();
    } else {
      c.drawImage(buf, 0, 0);
    }

    // ---- emboss / deboss: inner bevel highlight + shade along the shape edge ----
    if ((fxMode === 'emboss' || fxMode === 'deboss') && strength > 0) {
      const bevel = Math.max(1, inner * 0.06 * strength);
      const lightUp   = fxMode === 'emboss';
      // light from top-left, shade bottom-right (flipped for deboss)
      const hi = `rgba(255,255,255,${0.85 * strength})`;
      const lo = `rgba(0,0,0,${0.55 * strength})`;

      drawEdge(c, m, inner, r, bevel, -1, -1, lightUp ? hi : lo); // top-left
      drawEdge(c, m, inner, r, bevel,  1,  1, lightUp ? lo : hi); // bottom-right
    }
  }

  // strokes a soft edge of the shape, clipped to the shape, offset toward (dx,dy)
  function drawEdge(c, m, inner, r, bevel, dx, dy, color) {
    c.save();
    shapePath(c, m, m, inner, inner, r);
    c.clip();
    shapePath(c, m + dx * bevel * 0.6, m + dy * bevel * 0.6, inner, inner, r);
    c.lineWidth = bevel;
    c.strokeStyle = color;
    c.filter = `blur(${bevel * 0.5}px)`;
    c.stroke();
    c.restore();
  }

  function render() {
    paint(ctx, view.width); // device px (square = view.width)
  }

  function setZoom(pct, anchor) {
    pct = Math.max(10, Math.min(400, pct));
    const newScale = pct / 100 * baseScale;
    // zoom around anchor point (display px), default center
    const ax = anchor ? anchor.x : dispSize/2;
    const ay = anchor ? anchor.y : dispSize/2;
    const ratio = newScale / state.scale;
    state.x = ax - (ax - state.x) * ratio;
    state.y = ay - (ay - state.y) * ratio;
    state.scale = newScale;
    zoom.value = pct;
    zoomVal.textContent = Math.round(pct) + '%';
    render();
  }

  let baseScale = 1; // scale at which image "contains" the frame at 100%
  function loadImage(file) {
    if (!file || !file.type.startsWith('image/')) return;
    const url = URL.createObjectURL(file);
    const im = new Image();
    im.onload = () => {
      img = im;
      hint.style.display = 'none';
      // base = contain
      baseScale = Math.min(dispSize / img.width, dispSize / img.height);
      state.scale = baseScale;
      centerImage();
      enableControls(true);
      zoom.value = 100;
      zoomVal.textContent = '100%';
      render();
      URL.revokeObjectURL(url);
    };
    im.src = url;
  }

  function centerImage() {
    state.x = (dispSize - img.width * state.scale) / 2;
    state.y = (dispSize - img.height * state.scale) / 2;
  }

  function doFit() { // cover the frame
    baseScaleCover();
    centerImage();
    syncZoomDisplay();
    render();
  }
  function doContain() {
    baseScale = Math.min(dispSize / img.width, dispSize / img.height);
    state.scale = baseScale;
    centerImage();
    syncZoomDisplay();
    render();
  }
  function baseScaleCover() {
    baseScale = Math.max(dispSize / img.width, dispSize / img.height);
    state.scale = baseScale;
  }
  function syncZoomDisplay() {
    zoom.value = 100;
    zoomVal.textContent = '100%';
  }

  function enableControls(on) {
    zoom.disabled = !on;
    fitBtn.disabled = !on;
    containBtn.disabled = !on;
    exportBtn.disabled = !on;
  }

  // ---- events ----
  fileIn.addEventListener('change', e => loadImage(e.target.files[0]));

  zoom.addEventListener('input', () => setZoom(+zoom.value));
  radius.addEventListener('input', () => {
    radiusVal.textContent = radius.value + '%';
    render();
  });
  margin.addEventListener('input', () => {
    marginVal.textContent = margin.value + '%';
    render();
  });
  circle.addEventListener('change', () => {
    radius.disabled = circle.checked;
    render();
  });
  effect.addEventListener('click', e => {
    const b = e.target.closest('button');
    if (!b) return;
    [...effect.children].forEach(c => c.classList.remove('active'));
    b.classList.add('active');
    fxMode = b.dataset.fx;
    fxStrength.disabled = (fxMode === 'none');
    render();
  });
  fxStrength.addEventListener('input', () => {
    fxVal.textContent = fxStrength.value + '%';
    render();
  });
  fitBtn.addEventListener('click', doFit);
  containBtn.addEventListener('click', doContain);

  // wheel zoom
  frame.addEventListener('wheel', e => {
    if (!img) return;
    e.preventDefault();
    const rect = frame.getBoundingClientRect();
    const anchor = { x: e.clientX - rect.left, y: e.clientY - rect.top };
    const cur = +zoom.value;
    const next = cur * (e.deltaY < 0 ? 1.08 : 0.926);
    setZoom(next, anchor);
  }, { passive: false });

  // drag to pan
  let drag = null;
  frame.addEventListener('pointerdown', e => {
    if (!img) return;
    frame.setPointerCapture(e.pointerId);
    frame.classList.add('dragging');
    drag = { px: e.clientX, py: e.clientY, ox: state.x, oy: state.y };
  });
  frame.addEventListener('pointermove', e => {
    if (!drag) return;
    state.x = drag.ox + (e.clientX - drag.px);
    state.y = drag.oy + (e.clientY - drag.py);
    render();
  });
  function endDrag(e) {
    if (!drag) return;
    drag = null;
    frame.classList.remove('dragging');
  }
  frame.addEventListener('pointerup', endDrag);
  frame.addEventListener('pointercancel', endDrag);

  // drag & drop file
  ['dragenter','dragover'].forEach(ev =>
    frame.addEventListener(ev, e => { e.preventDefault(); frame.classList.add('over'); }));
  ['dragleave','drop'].forEach(ev =>
    frame.addEventListener(ev, e => { e.preventDefault(); frame.classList.remove('over'); }));
  frame.addEventListener('drop', e => {
    const f = e.dataTransfer.files[0];
    loadImage(f);
  });

  // size selector
  sizes.addEventListener('click', e => {
    const b = e.target.closest('button');
    if (!b) return;
    [...sizes.children].forEach(c => c.classList.remove('active'));
    b.classList.add('active');
    exportSize = b.dataset.size === 'orig' ? 'orig' : +b.dataset.size;
  });

  // export
  exportBtn.addEventListener('click', () => {
    if (!img) return;
    let size = exportSize;
    if (size === 'orig') {
      // use the larger image dimension mapped through current scale as a sensible square
      size = Math.round(Math.max(img.width, img.height));
      size = Math.max(64, Math.min(2048, size));
    }
    const off = document.createElement('canvas');
    off.width = size; off.height = size;
    const octx = off.getContext('2d');
    paint(octx, size);
    off.toBlob(blob => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `icon-${size}.png`;
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    }, 'image/png');
  });

  window.addEventListener('resize', () => {
    // keep transform proportional to new display size
    const old = dispSize;
    const r = frame.getBoundingClientRect();
    if (img && old) {
      const f = r.width / old;
      state.x *= f; state.y *= f; state.scale *= f; baseScale *= f;
    }
    resizeCanvas();
  });

  resizeCanvas();
})();
</script>
</body>
</html>
